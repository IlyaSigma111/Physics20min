            width: 100%;

            padding: 28px;
            border: 1px solid rgba(255, 136, 77, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .name-badge {
            background: rgba(255, 100, 50, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 500;
            color: #ffaa66;
            border: 1px solid #ff884d;
            font-size: 1rem;
        }

        .timer {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 2rem;
            font-weight: 500;
            color: #ff4d4d;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #ff884d;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        .progress-section {
            margin-bottom: 24px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            color: #88aaff;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 6px;
            background: #2a2a2e;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ffaa00);
            width: 0%;
            transition: width 0.3s;
        }

        .question-card {
            background: rgba(30, 40, 45, 0.9);
            border-radius: 28px;
            padding: 24px;
            margin: 20px 0;
            border: 1px solid rgba(255, 136, 77, 0.3);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #ffffff;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .calc-block {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            border-left: 3px solid #ff4d4d;
        }

        .calc-label {
            color: #ffaa66;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .formula {
            font-family: 'SF Mono', 'Courier New', monospace;

            padding: 10px 16px;
            border-radius: 14px;
            color: #ffaa66;
            border: 1px solid #ff884d;

        .options {

        .option {
            background: rgba(40, 50, 55, 0.9);
            border: 1px solid #4a5a65;
            border-radius: 18px;
            padding: 14px 18px;
            font-size: 1rem;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover {
            border-color: #ff884d;
            background: rgba(255, 100, 50, 0.2);
        }

        .option.selected {
            background: linear-gradient(135deg, #ff4d4d, #ff884d);
            border-color: #ff884d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-arrows {
            display: flex;
            gap: 8px;
        }

        .nav-arrow {
            width: 44px;

            background: rgba(40, 50, 55, 0.9);
            border: 1px solid #ff884d;
            border-radius: 50%;

            background: #ff884d;

        let gameId = null;
        let playerName = '';
        let currentQuestion = 0;
        let answers = {};
        let timerInterval = null;
        let hasSubmitted = false;

        window.joinGame = function() {
            const name = document.getElementById('playerName').value.trim();
            const code = document.getElementById('gameCode').value.trim();

            if (!name) return showError('Введи имя');
            if (!code || code.length !== 6) return showError('Код должен быть 6 цифр');

            playerName = name;
            gameId = `game_${code}`;

            document.getElementById('displayName').innerText = name;
            document.getElementById('displayCode').innerText = code;

            db.ref(`games/${gameId}`).once('value', (snap) => {
                const gameData = snap.val();
                if (!gameData) return showError('Тест не найден');

                if (gameData.status === 'finished') {
                    return showError('Этот тест уже завершён');
                }

                db.ref(`games/${gameId}/players/${name}`).set({
                    name: name,
                    joinedAt: Date.now(),
                    answers: {}
                });

                switchScreen('lobby', 'wait');
                listenToGame();
            }).catch(error => {
                showError('Ошибка подключения');
            });
        };

        function listenToGame() {
            db.ref(`games/${gameId}`).on('value', (snap) => {
                const data = snap.val();
                if (!data) return;

                if (data.players) {
                    const count = Object.keys(data.players).length;
                    document.getElementById('playersCount').innerText = count + ' учеников';
                }

                if (data.status === 'active') {
                    switchScreen('wait', 'game');
                    
                    if (data.players?.[playerName]?.answers) {
                        answers = data.players[playerName].answers;
                    }
                    
                    if (data.players?.[playerName]?.submittedAt) {
                        hasSubmitted = true;
                        document.getElementById('submitBtn').disabled = true;
                        document.getElementById('submitBtn').innerText = '✓ Результаты отправлены';
                    }
                    
                    showQuestion(currentQuestion);
                    updateProgress();
                    
                    if (data.startTime) {
                        startTimer(data.startTime, data.timeLimit || 900);
                    }
                }

                if (data.status === 'finished') {
                    finishGame();
                }
            });
        }

        function switchScreen(from, to) {
            document.getElementById(`screen${from.charAt(0).toUpperCase() + from.slice(1)}`).classList.add('hidden');
            document.getElementById(`screen${to.charAt(0).toUpperCase() + to.slice(1)}`).classList.remove('hidden');
        }

        function startTimer(startTime, limit) {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const remaining = Math.max(0, limit - elapsed);
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                
                document.getElementById('displayTimer').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    submitTest();
                }
            }, 1000);
        }

        function updateProgress() {
            const answered = Object.keys(answers).length;
            document.getElementById('answeredCount').innerText = `${answered}/30`;
            document.getElementById('progressFill').style.width = (answered / 30 * 100) + '%';
        }

        function showQuestion(index) {
            const q = QUESTIONS[index];
            document.getElementById('questionText').innerText = q.text;
            
            if (q.isCalc) {
                document.getElementById('calcBlock').classList.remove('hidden');
                document.getElementById('formulaDisplay').innerText = q.formula;
            } else {
                document.getElementById('calcBlock').classList.add('hidden');
            }
            
            let optionsHtml = '';
            q.options.forEach((opt, i) => {
                const selected = answers[q.id] === i ? 'selected' : '';
                optionsHtml += `<div class="option ${selected}" onclick="selectAnswer(${q.id}, ${i})">${opt}</div>`;
            });
            document.getElementById('optionsContainer').innerHTML = optionsHtml;
        }

        window.selectAnswer = (qid, opt) => {
            if (hasSubmitted) {
                alert('Ты уже отправил результаты. Нельзя менять ответы.');
                return;
            }
            
            answers[qid] = opt;
            db.ref(`games/${gameId}/players/${playerName}/answers/${qid}`).set(opt);
            
            updateProgress();
            
            document.querySelectorAll('.option').forEach((el, i) => {
                if (i === opt) el.classList.add('selected');
                else el.classList.remove('selected');
            });
        };

        window.prevQuestion = () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        };

        window.nextQuestion = () => {
            if (currentQuestion < 29) {
                currentQuestion++;
                showQuestion(currentQuestion);
            }
        };

        window.submitTest = function() {
            if (hasSubmitted) {
                alert('Ты уже отправил результаты');
                return;
            }
            
            const answeredCount = Object.keys(answers).length;
            if (answeredCount < 30) {
                if (!confirm(`Ты ответил только на ${answeredCount}/30 вопросов. Всё равно отправить?`)) {
                    return;
                }
            }
            
            let correct = 0;
            for (let i = 1; i <= 30; i++) {
                if (answers[i] === QUESTIONS[i-1].correct) correct++;
            }
            const score = Math.round(correct * 3.33);
            
            db.ref(`games/${gameId}/players/${playerName}`).update({
                answers: answers,
                score: score,
                correct: correct,
                submittedAt: Date.now()
            }).then(() => {
                hasSubmitted = true;
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').innerText = '✓ Результаты отправлены';
                alert('Результаты отправлены!');
            }).catch(error => {
                alert('Ошибка при отправке');
            });
        };

        function finishGame() {
            if (timerInterval) clearInterval(timerInterval);
            
            if (!hasSubmitted) {
                let correct = 0;
                for (let i = 1; i <= 30; i++) {
                    if (answers[i] === QUESTIONS[i-1].correct) correct++;
                }
                const score = Math.round(correct * 3.33);
                showResult(score, correct);
            } else {
                db.ref(`games/${gameId}/players/${playerName}`).once('value', (snap) => {
                    const player = snap.val();
                    showResult(player.score || 0, player.correct || 0);
                });
            }
        }

        function showResult(score, correct) {
            switchScreen('game', 'result');
            document.getElementById('finalScore').innerText = score + ' ☢️';
            
            let message = `Правильно: ${correct}/30 · `;
            if (correct >= 27) message += 'Ядерный физик! 🏆';
            else if (correct >= 24) message += 'Отлично! 🎉';
            else if (correct >= 18) message += 'Хорошо! 📚';
            else message += 'Изучи тему ещё раз! ⚛️';
            
            document.getElementById('finalMessage').innerHTML = message;
        }

        function showError(msg) {
            document.getElementById('errorMsg').innerText = msg;
        }

        window.exit = () => {
            location.reload();
        };

        document.getElementById('gameCode')?.addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '').substring(0, 6);
        });
    </script>
</body>
</html>
