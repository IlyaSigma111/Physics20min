<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☢️ РАДИОАКТИВНОСТЬ · главная</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles"></div>
    
    <div class="glass-card" style="justify-content: center; align-items: center;">
        <h1 style="font-size: 3rem;">☢️ R A D I O</h1>
        <h1 style="font-size: 2.5rem; margin-top: -10px;">A C T I V I T Y</h1>
        <div class="subtitle" style="margin-bottom: 40px;">альфа · бета · гамма | 9 класс</div>
        
        <button class="btn primary" onclick="location.href='teacher.html'" style="margin-bottom: 15px;">
            👨‍🔬 Я учитель
        </button>
        
        <button class="btn" onclick="location.href='student.html'">
            🧪 Я ученик
        </button>
        
        <div style="margin-top: 40px; font-size: 2rem; opacity: 0.5; letter-spacing: 10px;">
            ⚛️ ☢️ ⚛️
        </div>
    </div>

    <script>
        // Создаём радиоактивные частицы
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (10 + Math.random() * 15) + 's';
            document.getElementById('particles').appendChild(particle);
        }
    </script>
</body>
</html>
