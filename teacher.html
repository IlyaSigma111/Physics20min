<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учитель · РАДИОАКТИВНОСТЬ</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #0c1a1f 100%);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            color: #e0e0e0;
        }

        .teacher-dashboard {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .top-bar {
            background: rgba(20, 30, 35, 0.95);
            border-radius: 24px;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 136, 77, 0.4);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .code-section {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .code-label {
            color: #ffaa66;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .code-value {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 2.5rem;
            font-weight: 600;
            color: #ff4d4d;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 24px;
            border-radius: 20px;
            letter-spacing: 4px;
            border: 1px solid #ff884d;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        .timer-value {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 2.2rem;
            font-weight: 500;
            color: #ffaa66;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 24px;
            border-radius: 20px;
            border: 1px solid #ff884d;
        }

        .control-buttons {
            display: flex;
            gap: 12px;
        }

        .apple-btn {
            background: linear-gradient(135deg, #ff4d4d, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .apple-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 77, 77, 0.4);
        }

        .apple-btn.secondary {
            background: rgba(40, 50, 55, 0.9);
            color: #ffaa66;
            border: 1px solid #ff884d;
        }

        .apple-btn.secondary:hover {
            background: rgba(255, 100, 50, 0.3);
        }

        .main-panel {
            display: flex;
            gap: 24px;
            flex: 1;
            min-height: 0;
        }

        .students-panel {
            flex: 1.2;
            background: rgba(20, 30, 35, 0.95);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid rgba(255, 136, 77, 0.4);
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .panel-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffaa66;
        }

        .students-count {
            background: rgba(255, 100, 50, 0.2);
            padding: 6px 16px;
            border-radius: 30px;
            color: #ffaa66;
            font-weight: 500;
            border: 1px solid #ff884d;
        }

        .students-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .student-card {
            background: rgba(30, 40, 45, 0.9);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid #4a5a65;
            transition: all 0.2s;
        }

        .student-card:hover {
            border-color: #ff884d;
            background: rgba(40, 50, 55, 0.9);
        }

        .student-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .student-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #ffffff;
        }

        .student-score {
            color: #ff4d4d;
            font-weight: 600;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #ff884d;
        }

        .student-progress {
            height: 6px;
            background: #2a2a2e;
            border-radius: 6px;
            overflow: hidden;
            margin: 8px 0;
        }

        .student-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ffaa00);
            width: 0%;
            transition: width 0.3s;
        }

        .student-status {
            display: flex;
            justify-content: space-between;
            color: #88aaff;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .student-submitted {
            color: #4cd964;
            font-weight: 500;
        }

        .logs-panel {
            flex: 0.8;
            background: rgba(20, 30, 35, 0.95);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid rgba(255, 136, 77, 0.4);
            display: flex;
            flex-direction: column;
        }

        .logs-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logs-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffaa66;
        }

        .logs-filter {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            background: rgba(40, 50, 55, 0.9);
            border: 1px solid #ff884d;
            color: #ffaa66;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #ff4d4d, #ff884d);
            color: white;
            border-color: #ff884d;
        }

        .logs-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-entry {
            background: rgba(30, 40, 45, 0.9);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid #4a5a65;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .log-name {
            font-weight: 600;
            color: #ffaa66;
            font-size: 1.1rem;
        }

        .log-time {
            color: #88aaff;
            font-size: 0.8rem;
        }

        .log-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .progress-badge {
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            border: 1px solid #ff884d;
        }

        .progress-badge.one-third {
            color: #ffaa66;
            border-color: #ffaa66;
        }

        .progress-badge.two-thirds {
            color: #4cd964;
            border-color: #4cd964;
        }

        .progress-badge.submitted {
            color: #ff4d4d;
            border-color: #ff4d4d;
        }

        .log-message {
            color: #e0e0e0;
            font-size: 0.95rem;
        }

        .empty-state {
            color: #88aaff;
            text-align: center;
            padding: 40px 20px;
            font-style: italic;
            background: rgba(30, 40, 45, 0.8);
            border-radius: 20px;
            border: 1px dashed #ff884d;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #2a2a2e;
            border-radius: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff884d;
            border-radius: 8px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="teacher-dashboard">
        <div class="top-bar">
            <div class="code-section">
                <span class="code-label">☢️ КОД ТЕСТА</span>
                <span class="code-value" id="gameCode">000000</span>
            </div>
            
            <div class="timer-value" id="timer">15:00</div>
            
            <div class="control-buttons">
                <button class="apple-btn" onclick="createGame()" id="createBtn">Создать тест</button>
                <button class="apple-btn" onclick="startGame()" id="startBtn" style="display: none;">▶ Старт</button>
                <button class="apple-btn secondary" onclick="finishGame()" id="finishBtn" style="display: none;">⏹ Финиш</button>
            </div>
        </div>

        <div class="main-panel">
            <div class="students-panel">
                <div class="panel-header">
                    <h2>🧑‍🎓 Ученики</h2>
                    <span class="students-count" id="studentsCount">0</span>
                </div>
                
                <div class="students-list" id="studentsList">
                    <div class="empty-state">Нет подключенных учеников</div>
                </div>
            </div>

            <div class="logs-panel">
                <div class="logs-header">
                    <h2>📝 События</h2>
                    <div class="logs-filter">
                        <span class="filter-btn active" onclick="filterLogs('all')">Все</span>
                        <span class="filter-btn" onclick="filterLogs('progress')">Прогресс</span>
                        <span class="filter-btn" onclick="filterLogs('submits')">Отправки</span>
                    </div>
                </div>
                
                <div class="logs-list" id="logsList">
                    <div class="empty-state">Здесь появятся события</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // НОВЫЙ FIREBASE КОНФИГ
        const firebaseConfig = {
            apiKey: "AIzaSyCpikK-C1J9F_QHubNpke6dmSnTwWNLR4U",
            authDomain: "physics20min.firebaseapp.com",
            projectId: "physics20min",
            storageBucket: "physics20min.firebasestorage.app",
            messagingSenderId: "594019490255",
            appId: "1:594019490255:web:c5e2356a1f75089f861aba"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let gameId = null;
        let timerInterval = null;
        let currentFilter = 'all';
        let lastProgress = {};

        window.createGame = function() {
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            gameId = `game_${code}`;
            
            db.ref(`games/${gameId}`).set({
                status: 'waiting',
                startTime: null,
                timeLimit: 900,
                players: {},
                events: {}
            }).then(() => {
                document.getElementById('gameCode').innerText = code;
                document.getElementById('createBtn').style.display = 'none';
                document.getElementById('startBtn').style.display = 'inline-block';
                document.getElementById('finishBtn').style.display = 'inline-block';
                
                listenToGame();
                
                addEvent('Система', 'system', '☢️ Тест по радиоактивности создан');
            });
        };

        function listenToGame() {
            db.ref(`games/${gameId}`).on('value', (snap) => {
                const data = snap.val();
                if (!data) return;
                
                updateStudentsList(data.players);
                updateEvents(data.events);
                
                if (data.status === 'active' && data.startTime) {
                    startTimer(data.startTime, data.timeLimit);
                }
            });

            db.ref(`games/${gameId}/players`).on('child_changed', (snap) => {
                const playerName = snap.key;
                const playerData = snap.val();
                
                if (playerData.answers) {
                    const answeredCount = Object.keys(playerData.answers).length;
                    const prevCount = lastProgress[playerName] || 0;
                    
                    if (answeredCount >= 10 && prevCount < 10) {
                        addEvent(playerName, 'progress', 'ответил на 10 вопросов (альфа-уровень)');
                    }
                    if (answeredCount >= 20 && prevCount < 20) {
                        addEvent(playerName, 'progress', 'ответил на 20 вопросов (бета-уровень)');
                    }
                    
                    lastProgress[playerName] = answeredCount;
                }
                
                if (playerData.submittedAt && !lastProgress[`${playerName}_submitted`]) {
                    addEvent(playerName, 'submit', `отправил результаты · ${playerData.score || 0} баллов`);
                    lastProgress[`${playerName}_submitted`] = true;
                }
            });
        }

        function addEvent(name, type, message) {
            if (!gameId) return;
            
            const eventData = {
                name: name,
                type: type,
                message: message,
                timestamp: Date.now()
            };
            
            db.ref(`games/${gameId}/events`).push().set(eventData);
        }

        function updateStudentsList(players) {
            const list = document.getElementById('studentsList');
            const count = document.getElementById('studentsCount');
            
            if (!players || Object.keys(players).length === 0) {
                list.innerHTML = '<div class="empty-state">Нет подключенных учеников</div>';
                count.innerText = '0';
                return;
            }
            
            const playersArray = Object.entries(players);
            count.innerText = playersArray.length;
            
            let html = '';
            playersArray.forEach(([name, player]) => {
                const answered = player.answers ? Object.keys(player.answers).length : 0;
                const percent = (answered / 30) * 100;
                const isSubmitted = player.submittedAt ? true : false;
                
                html += `
                    <div class="student-card">
                        <div class="student-info">
                            <span class="student-name">${name}</span>
                            ${isSubmitted ? 
                                `<span class="student-score">${player.score || 0} ☢️</span>` : 
                                `<span class="student-score">${answered}/30</span>`
                            }
                        </div>
                        <div class="student-progress">
                            <div class="student-progress-fill" style="width: ${percent}%"></div>
                        </div>
                        <div class="student-status">
                            <span>${answered}/30 ответов</span>
                            ${isSubmitted ? 
                                '<span class="student-submitted">✓ Отправлено</span>' : 
                                '<span>⏳ В процессе</span>'
                            }
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }

        function updateEvents(events) {
            const eventsList = document.getElementById('logsList');
            
            if (!events || Object.keys(events).length === 0) {
                eventsList.innerHTML = '<div class="empty-state">Здесь появятся события</div>';
                return;
            }
            
            const eventsArray = Object.entries(events)
                .sort((a, b) => b[1].timestamp - a[1].timestamp)
                .filter(([_, event]) => {
                    if (currentFilter === 'all') return true;
                    if (currentFilter === 'progress') return event.type === 'progress';
                    if (currentFilter === 'submits') return event.type === 'submit' || event.type === 'system';
                    return true;
                })
                .slice(0, 50);
            
            if (eventsArray.length === 0) {
                eventsList.innerHTML = '<div class="empty-state">Нет событий по фильтру</div>';
                return;
            }
            
            let html = '';
            eventsArray.forEach(([id, event]) => {
                const time = new Date(event.timestamp).toLocaleTimeString('ru-RU', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit'
                });
                
                let badgeClass = '';
                let badgeText = '';
                if (event.type === 'progress') {
                    if (event.message.includes('10')) { badgeClass = 'one-third'; badgeText = '📊 Альфа-уровень'; }
                    if (event.message.includes('20')) { badgeClass = 'two-thirds'; badgeText = '📊 Бета-уровень'; }
                }
                if (event.type === 'submit') { badgeClass = 'submitted'; badgeText = '📨 Гамма-отправка'; }
                if (event.type === 'system') { badgeText = '⚙️ Система'; }
                
                html += `
                    <div class="log-entry">
                        <div class="log-header">
                            <span class="log-name">${event.name}</span>
                            <span class="log-time">${time}</span>
                        </div>
                        <div class="log-progress">
                            <span class="progress-badge ${badgeClass}">${badgeText || (event.type === 'progress' ? '📊 Прогресс' : '📨 Отправка')}</span>
                        </div>
                        <div class="log-message">
                            ${event.message}
                        </div>
                    </div>
                `;
            });
            
            eventsList.innerHTML = html;
        }

        window.filterLogs = function(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (gameId) {
                db.ref(`games/${gameId}/events`).once('value', (snap) => {
                    updateEvents(snap.val());
                });
            }
        };

        function startTimer(startTime, limit) {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const remaining = Math.max(0, limit - elapsed);
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                
                document.getElementById('timer').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    finishGame();
                }
            }, 1000);
        }

        window.startGame = function() {
            if (!gameId) return;
            db.ref(`games/${gameId}`).update({
                status: 'active',
                startTime: Date.now()
            });
            
            addEvent('Система', 'system', '⚛️ Тест начат! Удачи!');
        };

        window.finishGame = function() {
            if (!gameId) return;
            if (confirm('Завершить тест по радиоактивности?')) {
                db.ref(`games/${gameId}`).update({
                    status: 'finished'
                }).then(() => {
                    if (timerInterval) clearInterval(timerInterval);
                });
                
                addEvent('Система', 'system', '☢️ Тест завершён');
            }
        };
    </script>
</body>
</html>
